#CIS image installed customization
IMAGE_FEATURES:append = " \
                    ssh-server-openssh \
                    "

IMAGE_INSTALL:append = " \
                    ubus \
                    libubox \
                    ipcd \
                    list \
                    slot-upgrade \
                    mtvram \
                    ccfpga \
                    e2fsprogs \
                    log4cpp \
                    cronie \
                    logrotate \
                    jsoncpp \
                    jq \
                    re-boot \
                    libubootenv \
                    gpio-demo \
                    peekpoke \
                    rlog \
                    coldstartlog \
                    dhcpcd \
                    zsys-env \
                    sdev-setup \
                    netwk-setup \
                    storage-setup \
                    ptp-clockmatrix \
                    "

EXTEND_FPGA_PL_IMAGE = " \
                       fpga \
                       device-tree-overlay \
                       mmap \
                       insert-dtbo \
                       sec-setup \
                        "

EXTEND_SIMPLE_FPGA_PL_IMAGE = " \
                        mmap \
                        sec-setup \
                        "
#TPM related packs
TPM_EXTEND_IMAGE = " \
                     tpm2-tss \
                     tpm2-tools \
                     tpm2-tss-engine \
                     libtss2-tcti-device \
                   "

IMAGE_INSTALL:append:fara = " \
                             ${EXTEND_FPGA_PL_IMAGE} \
                             ${TPM_EXTEND_IMAGE} \
                            "

IMAGE_INSTALL:append:fara2 = " \
                             ${EXTEND_FPGA_PL_IMAGE} \
                             ${TPM_EXTEND_IMAGE} \
                            "
IMAGE_INSTALL:append:mega = " \
                             ${EXTEND_SIMPLE_FPGA_PL_IMAGE} \
                             ${TPM_EXTEND_IMAGE} \
                            "
IMAGE_INSTALL:remove:mega = "dhcpcd"
IMAGE_INSTALL:remove:vpk120 = "device-tree-overlay"
# Remove insert-dtbo from saku platform
IMAGE_LIST_TO_BE_REMOVED = "insert-dtbo"
IMAGE_LIST_TO_BE_REMOVED:remove:phoenix = "insert-dtbo"

IMAGE_INSTALL:remove:saku = "${IMAGE_LIST_TO_BE_REMOVED}"
IMAGE_INSTALL:append:fara3 = " passwdqc"
IMAGE_INSTALL:append:saku = " passwdqc"
IMAGE_INSTALL:append:zulu2 = " \
                              tftp-hpa-server \
                              passwdqc \
                             "

IMAGE_LIST_FOR_AUX_FPGA = "\
                    aux-dtbo \
                    auxfpgaload \
                    "

IMAGE_LIST_FOR_AUX_FPGA:remove:aux-upg = "aux-dtbo"
IMAGE_LIST_FOR_AUX_FPGA:append:aux-upg = " aux-fpga-image "

IMAGE_INSTALL:append:auxs = "${IMAGE_LIST_FOR_AUX_FPGA}"
IMAGE_INSTALL:append:emimom = " \
                               versal-fpga \
                               install-versal-pld \
                               tftp-hpa \
                               tftp-hpa-server \
                              "

RM_WORK_EXCLUDE:append = " \
                    ubus \
                    libubox \
                    ipcd \
                    list \
                    slot-upgrade \
                    mtvram \
                    ccfpga \
                    sysvinit-inittab \
                    zsys-env \
                    sdev-setup \
                    insert-dtbo \
                    netwk-setup \
                    storage-setup \
                    auxfpgaload \
                    aux-fpga \
                    rsmu-ctl \
                    aux-dtbo \
                    aux-fpga-image \
                    "

